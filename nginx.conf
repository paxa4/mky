server {
    listen 80;
    server_name _;

    # Максимальный размер загружаемого файла: покрывает Excel, фоны, факсимиле,
    # шрифты и вложения статей.
    client_max_body_size 30m;

    # Базовые защитные заголовки
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;

    # ── React SPA ────────────────────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        # try_files необходим для корректной работы React Router: любой URL,
        # не соответствующий файлу в dist/, отдаёт index.html.
        try_files $uri $uri/ /index.html;
    }

    # Долгосрочное кеширование неизменяемых ресурсов Vite
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Обратное проксирование API ────────────────────────────────────────────────
    # Все перечисленные префиксы — реальные маршруты FastAPI-приложения.
    location ~ ^/(auth|users|api|certificates|static)(/|$) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Заголовки проксирования (необходимы для корректного логирования и
        # формирования ссылок на стороне backend при будущем HTTPS).
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Таймаут достаточен для пакетной генерации PDF и загрузки файлов.
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    # OpenAPI / интерактивная документация
    location ~ ^/(docs|openapi\.json)(/|$) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Healthcheck — используется docker-compose для проверки готовности контейнера
    location = /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
